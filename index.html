<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ранобэ Архив</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0A0A;
      --surface: #111111;
      --surface-2: #1A1A1A;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --text: #F0EEE8;
      --text-muted: #666;
      --text-faint: #333;
      --accent: #E8E0D0;
      --accent-dim: rgba(232,224,208,0.1);
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    .page { max-width: 960px; margin: 0 auto; padding: 0 28px; }

    /* ── HEADER ── */
    header {
      padding: 32px 0 28px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 0.5px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
    .logo-icon {
      width: 42px; height: 42px; background: var(--text);
      border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-icon svg { width: 24px; height: 24px; }
    .logo-text .title { font-family: 'Onest', sans-serif; font-size: 19px; font-weight: 500; color: var(--text); letter-spacing: -0.3px; }
    .logo-text .sub { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
    .count-badge { font-size: 12px; color: var(--text-muted); background: var(--surface); border: 0.5px solid var(--border); padding: 4px 12px; border-radius: 20px; }
    .count-badge span { color: var(--accent); }

    /* ── HERO ── */
    .hero { padding: 48px 0 40px; border-bottom: 0.5px solid var(--border); }
    .hero h1 { font-family: 'Onest', sans-serif; font-size: 44px; font-weight: 300; letter-spacing: -1.2px; line-height: 1.12; margin-bottom: 14px; }
    .hero h1 em { font-style: normal; color: var(--accent); }
    .hero p { font-size: 14px; color: var(--text-muted); line-height: 1.75; max-width: 380px; }

    /* ── CONTROLS ── */
    .controls {
      padding: 22px 0 18px;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      border-bottom: 0.5px solid var(--border);
    }
    .search-wrap { flex: 1; min-width: 180px; position: relative; }
    .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 15px; pointer-events: none; }
    .search-input {
      width: 100%; background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 7px; color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 13px; padding: 9px 12px 9px 36px; outline: none; transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--border-hover); }

    .genre-filters { display: flex; gap: 5px; flex-wrap: wrap; }
    .genre-btn {
      background: var(--surface); border: 0.5px solid var(--border);
      color: var(--text-muted); font-family: 'Inter', sans-serif;
      font-size: 11px; padding: 6px 13px; border-radius: 20px;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .genre-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .genre-btn.active { background: var(--accent-dim); border-color: rgba(232,224,208,0.3); color: var(--accent); }

    /* ── ALPHA NAV ── */
    .alpha-nav {
      padding: 14px 0; border-bottom: 0.5px solid var(--border);
      display: flex; gap: 1px; flex-wrap: wrap; align-items: center;
    }
    .nav-label { font-size: 10px; color: var(--text-faint); margin-right: 6px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }
    .alpha-btn {
      background: none; border: none; color: var(--text-faint);
      font-family: 'Onest', sans-serif; font-size: 12px; font-weight: 500;
      padding: 3px 5px; cursor: pointer; border-radius: 3px; transition: all 0.12s;
    }
    .alpha-btn.has-items { color: var(--text-muted); }
    .alpha-btn.has-items:hover { color: var(--text); background: var(--surface); }
    .alpha-btn:disabled { opacity: 0.25; cursor: default; }

    /* ── GRID ── */
    .list-area { padding: 36px 0 80px; }
    .alpha-section { margin-bottom: 48px; }
    .section-letter {
      font-family: 'Onest', sans-serif; font-size: 10px; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-faint);
      margin-bottom: 18px; padding-bottom: 10px; border-bottom: 0.5px solid var(--border);
    }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 18px; }

    .card-wrap { display: flex; flex-direction: column; }

    .card {
      position: relative; cursor: pointer;
      border-radius: 6px; overflow: hidden;
      border: 0.5px solid var(--border);
      transition: border-color 0.15s, transform 0.15s;
      aspect-ratio: 2/3; background: var(--surface);
    }
    .card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
    .card.open { border-color: rgba(232,224,208,0.4); }

    .card-cover { width: 100%; height: 100%; position: relative; overflow: hidden; }
    .card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .cover-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; padding: 14px;
    }
    .cover-placeholder i { font-size: 24px; color: rgba(255,255,255,0.2); }
    .cover-placeholder .ph-title { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.4); text-align: center; line-height: 1.3; }

    .card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
      padding: 22px 10px 9px;
      display: flex; align-items: flex-end; justify-content: flex-end;
    }
    .card-chevron { font-size: 14px; color: rgba(255,255,255,0.45); transition: color 0.15s; }
    .card:hover .card-chevron { color: var(--accent); }
    .card.open .card-chevron { color: var(--accent); }

    .card-info { padding: 8px 2px 0; }
    .card-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.35; margin-bottom: 3px; }
    .card-author { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .card-genres { display: flex; gap: 0; flex-wrap: wrap; }
    .genre-tag { font-size: 9px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-faint); }
    .genre-tag + .genre-tag::before { content: ' · '; }

    /* ── FILES PANEL ── */
    .files-panel-row { grid-column: 1 / -1; display: none; margin-top: 2px; }
    .files-panel-row.open { display: block; }

    .files-panel {
      background: var(--surface);
      border: 0.5px solid rgba(232,224,208,0.18);
      border-radius: 8px; overflow: hidden; margin-bottom: 6px;
    }

    .files-header {
      padding: 14px 18px; border-bottom: 0.5px solid var(--border);
      display: flex; align-items: center; gap: 14px;
    }
    .fh-cover {
      width: 36px; height: 54px; border-radius: 3px; overflow: hidden;
      background: var(--surface-2); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .fh-cover img { width: 100%; height: 100%; object-fit: cover; }
    .fh-cover i { font-size: 16px; color: rgba(255,255,255,0.15); }
    .fh-info { flex: 1; min-width: 0; }
    .fh-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fh-meta { font-size: 11px; color: var(--text-muted); }
    .fh-close {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 18px; padding: 4px; border-radius: 4px; transition: color 0.12s; flex-shrink: 0;
    }
    .fh-close:hover { color: var(--text); }

    .file-item {
      display: flex; align-items: center; padding: 11px 18px;
      border-bottom: 0.5px solid var(--border);
      transition: background 0.12s; text-decoration: none; color: inherit;
    }
    .file-item:last-child { border-bottom: none; }
    .file-item:hover { background: var(--surface-2); }
    .fi-icon { font-size: 15px; color: var(--text-muted); margin-right: 12px; flex-shrink: 0; transition: color 0.12s; }
    .file-item:hover .fi-icon { color: var(--accent); }
    .fi-name { font-size: 13px; color: var(--text); flex: 1; }
    .fi-size { font-size: 11px; color: var(--text-muted); margin-left: 16px; white-space: nowrap; }
    .fi-dl { font-size: 14px; color: var(--text-faint); margin-left: 12px; transition: color 0.12s; }
    .file-item:hover .fi-dl { color: var(--accent); }

    /* ── EMPTY / LOADING ── */
    .state-msg { padding: 80px 0; text-align: center; }
    .state-msg i { font-size: 32px; color: var(--text-faint); margin-bottom: 14px; display: block; }
    .state-msg p { font-size: 13px; color: var(--text-muted); }

    /* ── FOOTER ── */
    footer {
      border-top: 0.5px solid var(--border); padding: 22px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    footer p { font-size: 11px; color: var(--text-faint); }
    footer a { color: var(--text-faint); text-decoration: none; transition: color 0.15s; }
    footer a:hover { color: var(--text-muted); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .hero h1 { font-size: 32px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
      .controls { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

<div class="page">

  <header>
    <a class="logo" href="index.html" aria-label="Ранобэ Архив — главная">
      <div class="logo-icon">
        <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="1" y="1" width="24" height="24" rx="2" stroke="#0A0A0A" stroke-width="1.5" fill="none"/>
          <path d="M13 5C13 5 8 9 8 13.5C8 16.54 10.24 19 13 19C15.76 19 18 16.54 18 13.5C18 9 13 5 13 5Z" fill="#0A0A0A"/>
          <path d="M13 19V22" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="title">Ранобэ Архив</div>
        <div class="sub">Русская библиотека</div>
      </div>
    </a>
    <div class="count-badge"><span id="total-count">—</span> произведений</div>
  </header>

  <div class="hero">
    <h1>Архив<br>русских <em>ранобэ</em></h1>
    <p>Коллекция переводов и оригинальных произведений в формате epub. Скачивай, читай, наслаждайся.</p>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" class="search-input" id="search-input" placeholder="Поиск по названию или автору...">
    </div>
    <div class="genre-filters" id="genre-filters">
      <button class="genre-btn active" data-genre="all">Все</button>
    </div>
  </div>

  <nav class="alpha-nav" id="alpha-nav" aria-label="Алфавитная навигация">
    <span class="nav-label">А–Я</span>
  </nav>

  <main class="list-area" id="list-area">
    <div class="state-msg">
      <i class="ti ti-loader-2" aria-hidden="true"></i>
      <p>Загружаем архив...</p>
    </div>
  </main>

  <footer>
    <p>Ранобэ Архив — личная коллекция</p>
    <p id="footer-stats"></p>
  </footer>

</div>

<script>
  const RU_ALPHA = 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ'.split('');
  let allData = [];
  let activeGenre = 'all';
  let searchQuery = '';
  let openId = null;

  // ── Load data ──
  fetch('data.json')
    .then(r => r.json())
    .then(json => {
      allData = (json.ranobe || []).sort((a, b) => a.title.localeCompare(b.title, 'ru'));
      buildGenreFilters();
      render();
    })
    .catch(() => {
      document.getElementById('list-area').innerHTML = `
        <div class="state-msg">
          <i class="ti ti-wifi-off" aria-hidden="true"></i>
          <p>Не удалось загрузить data.json. Проверь, что файл находится рядом с index.html.</p>
        </div>`;
    });

  // ── Build genre buttons from actual data ──
  function buildGenreFilters() {
    const genres = [...new Set(allData.flatMap(r => r.genres || []))].sort((a, b) => a.localeCompare(b, 'ru'));
    const container = document.getElementById('genre-filters');
    genres.forEach(g => {
      const btn = document.createElement('button');
      btn.className = 'genre-btn';
      btn.dataset.genre = g;
      btn.textContent = g;
      container.appendChild(btn);
    });
    container.addEventListener('click', e => {
      const btn = e.target.closest('.genre-btn');
      if (!btn) return;
      container.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeGenre = btn.dataset.genre;
      openId = null;
      render();
    });
  }

  // ── Filter ──
  function getFiltered() {
    const q = searchQuery.toLowerCase();
    return allData.filter(r => {
      const matchGenre = activeGenre === 'all' || (r.genres || []).includes(activeGenre);
      const matchSearch = r.title.toLowerCase().includes(q) || (r.author || '').toLowerCase().includes(q);
      return matchGenre && matchSearch;
    });
  }

  function groupByAlpha(items) {
    const g = {};
    items.forEach(r => {
      const l = (r.title[0] || '?').toUpperCase();
      if (!g[l]) g[l] = [];
      g[l].push(r);
    });
    return g;
  }

  // ── Alpha nav ──
  function renderAlphaNav(filtered) {
    const nav = document.getElementById('alpha-nav');
    const letters = new Set(filtered.map(r => r.title[0].toUpperCase()));
    nav.innerHTML = '<span class="nav-label">А–Я</span>';
    RU_ALPHA.forEach(l => {
      const btn = document.createElement('button');
      btn.className = 'alpha-btn' + (letters.has(l) ? ' has-items' : '');
      btn.textContent = l;
      btn.disabled = !letters.has(l);
      btn.setAttribute('aria-label', 'Перейти к букве ' + l);
      if (letters.has(l)) {
        btn.onclick = () => {
          const el = document.getElementById('sec-' + l);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
      }
      nav.appendChild(btn);
    });
  }

  // ── Cover HTML ──
  function coverHTML(r) {
    if (r.cover) {
      return `<img src="${r.cover}" alt="${r.title}" loading="lazy">`;
    }
    const bg = stringToColor(r.title);
    return `<div class="cover-placeholder" style="background:${bg}">
      <i class="ti ti-book-2" aria-hidden="true"></i>
      <span class="ph-title">${r.title}</span>
    </div>`;
  }

  function stringToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
    const palettes = ['#1a1a2e','#16213e','#0f3460','#1b1b2f','#2d132c','#1c1c1c','#0d1b2a','#162447'];
    return palettes[Math.abs(hash) % palettes.length];
  }

  function filesWord(n) {
    if (n === 1) return '1 файл';
    if (n >= 2 && n <= 4) return n + ' файла';
    return n + ' файлов';
  }

  // ── Main render ──
  function render() {
    const filtered = getFiltered();
    const area = document.getElementById('list-area');
    area.innerHTML = '';

    document.getElementById('total-count').textContent = allData.length;

    if (!filtered.length) {
      area.innerHTML = `<div class="state-msg"><i class="ti ti-books-off" aria-hidden="true"></i><p>Ничего не найдено. Попробуй другой запрос.</p></div>`;
      renderAlphaNav([]);
      return;
    }

    renderAlphaNav(filtered);

    const groups = groupByAlpha(filtered);
    const sortedLetters = Object.keys(groups).sort((a, b) => RU_ALPHA.indexOf(a) - RU_ALPHA.indexOf(b));

    sortedLetters.forEach(letter => {
      const sec = document.createElement('div');
      sec.className = 'alpha-section';
      sec.id = 'sec-' + letter;

      const lEl = document.createElement('div');
      lEl.className = 'section-letter';
      lEl.textContent = letter;
      sec.appendChild(lEl);

      const grid = document.createElement('div');
      grid.className = 'grid';

      groups[letter].forEach(ranobe => {
        const isOpen = openId === ranobe.id;

        const wrap = document.createElement('div');
        wrap.className = 'card-wrap';

        const card = document.createElement('div');
        card.className = 'card' + (isOpen ? ' open' : '');
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        card.setAttribute('aria-label', ranobe.title);
        card.innerHTML = `
          <div class="card-cover">${coverHTML(ranobe)}</div>
          <div class="card-overlay">
            <i class="ti ${isOpen ? 'ti-chevron-up' : 'ti-chevron-down'} card-chevron" aria-hidden="true"></i>
          </div>
        `;

        const info = document.createElement('div');
        info.className = 'card-info';
        info.innerHTML = `
          <div class="card-title">${ranobe.title}</div>
          ${ranobe.author ? `<div class="card-author">${ranobe.author}</div>` : ''}
          <div class="card-genres">${(ranobe.genres || []).map(g => `<span class="genre-tag">${g}</span>`).join('')}</div>
        `;

        wrap.appendChild(card);
        wrap.appendChild(info);
        grid.appendChild(wrap);

        const toggle = () => {
          openId = isOpen ? null : ranobe.id;
          render();
        };
        card.addEventListener('click', toggle);
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
        });
      });

      sec.appendChild(grid);

      // Inject files panel after grid if something is open in this letter group
      const openRanobe = groups[letter].find(r => r.id === openId);
      if (openRanobe) {
        const panelRow = document.createElement('div');
        panelRow.className = 'files-panel-row open';

        const coverThumb = openRanobe.cover
          ? `<img src="${openRanobe.cover}" alt="">`
          : `<i class="ti ti-book-2" aria-hidden="true"></i>`;

        panelRow.innerHTML = `
          <div class="files-panel">
            <div class="files-header">
              <div class="fh-cover">${coverThumb}</div>
              <div class="fh-info">
                <div class="fh-title">${openRanobe.title}</div>
                <div class="fh-meta">${openRanobe.author ? openRanobe.author + ' · ' : ''}${filesWord((openRanobe.files || []).length)} · ${(openRanobe.genres || []).join(', ')}</div>
              </div>
              <button class="fh-close" aria-label="Закрыть"><i class="ti ti-x" aria-hidden="true"></i></button>
            </div>
            ${(openRanobe.files || []).map(f => `
              <a class="file-item" href="${f.url || '#'}" download title="Скачать ${f.name}">
                <i class="ti ti-file fi-icon" aria-hidden="true"></i>
                <span class="fi-name">${f.name}</span>
                <span class="fi-size">${f.size || ''}</span>
                <i class="ti ti-download fi-dl" aria-hidden="true"></i>
              </a>
            `).join('')}
          </div>
        `;

        panelRow.querySelector('.fh-close').addEventListener('click', () => { openId = null; render(); });
        sec.appendChild(panelRow);
      }

      area.appendChild(sec);
    });

    const totalFiles = filtered.reduce((s, r) => s + (r.files || []).length, 0);
    document.getElementById('footer-stats').textContent = `${filtered.length} произведений · ${totalFiles} файлов`;
  }

  // ── Search ──
  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value;
    openId = null;
    render();
  });
</script>

</body>
</html>
